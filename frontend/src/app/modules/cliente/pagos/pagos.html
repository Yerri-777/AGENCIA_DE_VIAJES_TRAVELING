<div class="pagos-wrap">
  <h3>Registrar Pago</h3>
  <div class="row">
    <label>Número reservación</label>
    <input [(ngModel)]="numero" />
  </div>
  <div class="row">
    <label>Monto</label>
    <input type="number" [(ngModel)]="monto" />
  </div>
  <div class="row">
    <label>Método</label>
    <select [(ngModel)]="metodo">
      <option [value]="1">Efectivo</option>
      <option [value]="2">Tarjeta</option>
      <option [value]="3">Transferencia</option>
    </select>
  </div>
  <div class="row">
    <label>Fecha</label>
    <input type="date" [(ngModel)]="fecha" />
  </div>
  <div class="row actions">
    <button (click)="registrar()">Registrar</button>
  </div>
  <div class="mensaje">{{mensaje}}</div>

  <h4>Pagos recientes</h4>
  <table class="lista">
    <thead><tr><th>Reserva</th><th>Monto</th><th>Método</th><th>Fecha</th></tr></thead>
    <tbody>
      <tr *ngFor="let p of pagos">
        <td>{{p.numero_reservacion}}</td>
        <td>{{p.monto}}</td>
        <td>{{p.metodo}}</td>
        <td>{{p.fecha}}</td>
      </tr>
    </tbody>
  </table>
</div>
